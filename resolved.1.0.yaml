  /customs/excise/traders/pre-validate:
    post:
      tags:
      - Traders
      summary: INT241 Excise Pre-Validation
      parameters:
      - name: x-correlation-id
        in: header
        description: Correlation Id for tracking transactions internally and externally
        required: false
        style: simple
        explode: false
        schema:
          maxLength: 36
          minLength: 36
          type: string
          format: uuid
          example: 3e8dae97-b586-4cef-8511-68ac12da9028
      - name: Content-Type
        in: header
        description: Type of message content to expect
        required: true
        style: simple
        explode: false
        schema:
          type: string
          enum:
          - application/json
          default: application/json
      - name: Accept
        in: header
        description: Type of message content to accept
        required: true
        style: simple
        explode: false
        schema:
          type: string
          example: application/json
          enum:
          - application/json
      requestBody:
        content:
          application/json:
            schema:
              required:
              - entityGroup
              - exciseRegistrationNumber
              - validateProductAuthorisationRequest
              type: object
              properties:
                exciseRegistrationNumber:
                  pattern: "[A-Z]{2}[a-zA-Z0-9]{11}"
                  type: string
                entityGroup:
                  type: string
                  example: UK Record
                  enum:
                  - UK Record
                  - EU Trader
                  - EU Warehouse
                  - UK Temporary Authorisation
                  - EU Temporary Authorisation
                validateProductAuthorisationRequest:
                  maxItems: 10
                  minItems: 1
                  type: array
                  items:
                    required:
                    - product
                    type: object
                    properties:
                      product:
                        required:
                        - exciseProductCode
                        type: object
                        properties:
                          exciseProductCode:
                            maxLength: 4
                            pattern: "[A-Z][0-9]{3}"
                            type: string
                            description: The excise product category code
                            example: W200
      responses:
        "200":
          description: Return Excise confirmation
          headers:
            x-correlation-id:
              description: Correlation Id for tracking transactions internally and
                externally
              required: true
              style: simple
              explode: false
              schema:
                maxLength: 36
                minLength: 36
                type: string
                format: uuid
                example: 3e8dae97-b586-4cef-8511-68ac12da9028
            datetime:
              description: Response datetime
              required: true
              style: simple
              explode: false
              schema:
                pattern: "^(?:[0-9]{4}-[01][0-9]-[0-3][0-9])T(?:[01][0-9]|2[0-3]):[0-5][0-9]:[0-5][0-9](\\\
                  .[0-9]+)?Z$"
                type: string
                format: date-time
                example: 2011-10-05T14:48:00Z
            source:
              description: Application source
              required: true
              style: simple
              explode: false
              schema:
                type: string
                example: MDTP
            content-type:
              description: Type of message content to expect
              required: true
              style: simple
              explode: false
              schema:
                type: string
                enum:
                - application/json
                default: application/json
          content:
            application/json:
              schema:
                required:
                - entityGroup
                - exciseRegistrationNumber
                - validTrader
                - validationTimestamp
                type: object
                properties:
                  validationTimestamp:
                    pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}(\\\
                      \\.[0-9]+)?([+-][0-9]{2}:[0-9]{2})?$"
                    type: string
                    example: 2001-12-17T09:30:47-05:00
                  exciseRegistrationNumber:
                    pattern: "[A-Z]{2}[a-zA-Z0-9]{11}"
                    type: string
                  entityGroup:
                    type: string
                    example: UK Record
                    enum:
                    - UK Record
                    - EU Trader
                    - EU Warehouse
                    - UK Temporary Authorisation
                    - EU Temporary Authorisation
                  validTrader:
                    type: boolean
                  errorCode:
                    type: string
                    description: "The 'errorCode' for an invalid trader i.e., when\
                      \ validTrader = \"false\".<br /> 1 = Pending<br /> 2 = Expired<br\
                      \ /> 3 = Withdrawn<br /> 4 = Cancelled<br /> 5 = Used<br />\
                      \ 6 = Not Found"
                    enum:
                    - "1"
                    - "2"
                    - "3"
                    - "4"
                    - "5"
                    - "6"
                  errorText:
                    type: string
                  traderType:
                    type: string
                    description: 1 = Warehouse Keeper<br /> 2 = Tax Warehouse<br />
                      3 = Registered Consignor<br /> 4 = Registered Consignee<br />
                      5 = Temporary Registered Consignee<br /> 6 = Temporary Registered
                      Authorisation<br /> 7 = Other
                    enum:
                    - "1"
                    - "2"
                    - "3"
                    - "4"
                    - "5"
                    - "6"
                    - "7"
                  validateProductAuthorisationResponse:
                    required:
                    - valid
                    type: object
                    properties:
                      valid:
                        type: boolean
                      productError:
                        type: array
                        items:
                          required:
                          - errorCode
                          - errorText
                          - exciseProductCode
                          type: object
                          properties:
                            exciseProductCode:
                              maxLength: 4
                              pattern: "[A-Z][0-9]{3}"
                              type: string
                              description: The excise product category code
                              example: W200
                            errorCode:
                              type: string
                              description: 1 = Unrecognised EPC<br /> 2 = Unauthorised
                                EPC<br /> 3 = EPC exceeded
                              enum:
                              - "1"
                              - "2"
                              - "3"
                            errorText:
                              type: string
                              description: The 'errorText' will be populated with:<br
                                /> 'Unrecognised EPC' if errorCode = 1<br />'Unauthorised
                                EPC' if errorCode = 2<br />'EPC exceeded' if errorCode
                                = 3
              examples:
                Success:
                  summary: Validated successfully
                  value:
                    validationTimestamp: 2001-12-17T09:30:47-05:00
                    exciseRegistrationNumber: GBWK002281023
                    entityGroup: UK Record
                    validTrader: true
                    traderType: "1"
                    validateProductAuthorisationResponse:
                      valid: true
                Invalid trader:
                  summary: Invalid trader
                  value:
                    validationTimeStamp: 2001-12-17T09:30:47-05:00
                    exciseRegistrationNumber: GBWK000000000
                    entityGroup: UK Record
                    validTrader: false
                    errorCode: "6"
                    errorText: Not Found
                Invalid product codes:
                  summary: Invalid product codes
                  value:
                    validationTimeStamp: 2001-12-17T09:30:47-05:00
                    exciseRegistrationNumber: GBWK000000206
                    entityGroup: UK Record
                    validTrader: true
                    traderType: "1"
                    validateProductAuthorisationResponse:
                      valid: false
                      productError:
                      - exciseProductCode: W300
                        errorCode: "2"
                        errorText: Unauthorised EPC
                      - exciseProductCode: S200
                        errorCode: "1"
                        errorText: Unrecognised EPC
        "400":
          description: "Incorrect data, incorrect data format, missing parameters"
          headers:
            x-correlation-id:
              description: Correlation Id for tracking transactions internally and
                externally
              required: true
              style: simple
              explode: false
              schema:
                maxLength: 36
                minLength: 36
                type: string
                format: uuid
                example: 3e8dae97-b586-4cef-8511-68ac12da9028
            datetime:
              description: Date and time at which the API was actioned
              required: true
              style: simple
              explode: false
              schema:
                pattern: "^(?:[0-9]{4}-[01][0-9]-[0-3][0-9])T(?:[01][0-9]|2[0-3]):[0-5][0-9]:[0-5][0-9](\\\
                  .[0-9]+)?Z$"
                type: string
                example: 2021-12-17T09:30:47Z
            source:
              description: The origin of the API response
              required: true
              style: simple
              explode: false
              schema:
                type: string
                example: MDTP
                enum:
                - MDTP
            content-type:
              description: Type of message content to expect
              required: true
              style: simple
              explode: false
              schema:
                type: string
                enum:
                - application/json
                default: application/json
          content:
            application/json:
              schema:
                required:
                - message
                - processingDateTime
                type: object
                properties:
                  processingDateTime:
                    pattern: "^(?:[0-9]{4}-[01][0-9]-[0-3][0-9])T(?:[01][0-9]|2[0-3]):[0-5][0-9]:[0-5][0-9](\\\
                      .[0-9]+)?Z$"
                    type: string
                    description: Date and time of the API response
                    example: 2021-12-17T09:30:47Z
                  message:
                    maxLength: 256
                    type: string
                    example: Invalid message format
                description: "Incorrect data, incorrect data format, missing parameters\
                  \ etc"
        "500":
          description: Return 500 error for any 5XX errors
          headers:
            x-correlation-id:
              description: Correlation ID for traceability
              required: true
              style: simple
              explode: false
              schema:
                maxLength: 36
                minLength: 36
                type: string
                format: uuid
                example: 36b8f84d-df4e-4d49-b662-bcde71a8764f
            datetime:
              description: Response datetime
              required: true
              style: simple
              explode: false
              schema:
                pattern: "^(?:[0-9]{4}-[01][0-9]-[0-3][0-9])T(?:[01][0-9]|2[0-3]):[0-5][0-9]:[0-5][0-9](\\\
                  .[0-9]+)?Z$"
                type: string
                example: 2021-12-17T09:30:47Z
            source:
              description: Application source
              required: true
              style: simple
              explode: false
              schema:
                type: string
                example: ETDS
            content-type:
              description: Type of message content to expect
              required: true
              style: simple
              explode: false
              schema:
                type: string
                enum:
                - application/json
                default: application/json
          content:
            application/json:
              schema:
                required:
                - messages
                - processingDateTime
                type: object
                properties:
                  processingDateTime:
                    pattern: "^(?:[0-9]{4}-[01][0-9]-[0-3][0-9])T(?:[01][0-9]|2[0-3]):[0-5][0-9]:[0-5][0-9](\\\
                      .[0-9]+)?Z$"
                    type: string
                    description: Date and time of the API response
                    example: 2021-12-17T09:30:47Z
                  messages:
                    type: array
                    example:
                    - Internal server error
                    items:
                      type: string
                description: "500 In case of a system error such as invalid JSON submitted\
                  \ (invalid JSON format, not schema-related)"
      security:
      - userRestricted:
        - excise-movement-control-system
