openapi: 3.0.3
info:
  title: Excise Movement Control System API
  description: "Use the EMCS API to submit excise movement notifications to the Excise\
    \ Movement and Control System (EMCS). You can also send and receive messages about\
    \ excise movements and retrieve information about excise traders. \n\nThe [EMCS\
    \ API service guide](/guides/emcs-api-service-guide-4-2/) contains a detailed\
    \ overview of v1.0 of the API.\n\nTesting instructions can be found in the [EMCS\
    \ API testing guide](/guides/emcs-api-testing-guide-4-2/)."
  contact: {}
  version: 1.0.0
servers:
- url: https://test-api.service.hmrc.gov.uk
  description: Sandbox
- url: https://api.service.hmrc.gov.uk
  description: Production
tags:
- name: Movements
  description: "Create, amend or cancel an excise movement"
- name: Traders
  description: Information relating to excise traders
paths:
  /customs/excise/movements:
    get:
      tags:
      - Movements
      summary: Get excise movements
      description: Get excise movements. </br></br>**Note:** You will only be able
        to retrieve movements where the consignor ID or consignee ID of the movement
        matches any of your excise reference numbers (ERNs) in the bearer token that
        you use for API authentication.
      operationId: getAllMovements
      parameters:
      - name: Accept
        in: header
        description: "Specifies the response format and the [version](/api-documentation/docs/reference-guide#versioning)\
          \ of the API to be used."
        required: true
        style: simple
        explode: false
        schema:
          type: string
          enum:
          - application/vnd.hmrc.1.0+json
      - name: ern
        in: query
        description: "Filter excise movements by excise reference number (consignor\
          \ ID/consignee ID). If you do not provide an excise reference number (ERN)\
          \ as a query parameter, you will get a list for all ERNs in your bearer\
          \ token."
        required: false
        style: form
        explode: true
        schema:
          type: string
      - name: arc
        in: query
        description: Filter excise movements by administrative reference code (ARC).
          This will return one movement in the list.
        required: false
        style: form
        explode: true
        schema:
          type: string
      - name: lrn
        in: query
        description: Filter excise movements by local reference number (LRN)
        required: false
        style: form
        explode: true
        schema:
          type: string
      - name: updatedSince
        in: query
        description: "Filter excise movements modified after provided timestamp.<br/>This\
          \ can be used to poll for any updated movements.<br/>For each updated movement\
          \ that gets returned, you can then call the get messages endpoint and pass\
          \ in the same value for its \"updatedSince\" query parameter to get the\
          \ messages that have been received since you last polled."
        required: false
        style: form
        explode: true
        schema:
          type: string
          format: date-time
      - name: traderType
        in: query
        description: Filter excise movements by trader type (consignor or consignee)
        required: false
        style: form
        explode: true
        schema:
          type: string
          description: The type of trader (consignor or consignee)
          enum:
          - consignor
          - consignee
      responses:
        "200":
          description: "Successful operation. If there are no movements for any of\
            \ your excise reference numbers (ERNs) in your bearer token or because\
            \ of the filters, this will return an empty list."
          content:
            application/vnd.hmrc.1.0+json:
              schema:
                type: array
                items:
                  required:
                  - consignorId
                  - localReferenceNumber
                  - movementId
                  type: object
                  properties:
                    movementId:
                      type: string
                      format: uuid
                      example: b6ba6a73-d723-4c9f-b9b7-99e533fb614f
                    boxId:
                      type: string
                      format: uuid
                      example: 42c75e22-7bba-44f2-a610-4b4c3b262e3e
                    localReferenceNumber:
                      pattern: ".{1,22}"
                      type: string
                    consignorId:
                      pattern: "[A-Z]{2}[a-zA-Z0-9]{11}"
                      type: string
                    consigneeId:
                      pattern: ".{1,16}"
                      type: string
                    administrativeReferenceCode:
                      pattern: "[0-9]{2}[A-Z]{2}[A-Z0-9]{16}[0-9]"
                      type: string
                    lastUpdated:
                      type: string
                      format: date-time
                  xml:
                    name: exciseMovement
              example:
              - movementId: b6ba6a73-d723-4c9f-b9b7-99e533fb614f
                consignorId: GBWK002281023
                consigneeId: GBWKQOZ8OVLYR
                localReferenceNumber: LRNQA20230909022221
                lastUpdated: 2024-01-17T15:27:29.540089Z
                administrativeReferenceCode: 35WE3B5EDSYSZ86STVKH8
              - movementId: 612d2527-c207-4ffb-9250-f4ece59a29c5
                consignorId: GBWK002281023
                consigneeId: GBWKQOZ8OVLYQ
                localReferenceNumber: LRNQA20230909022224
                lastUpdated: 2024-01-17T15:25:29.540089Z
        "400":
          description: Bad request - either filter ERN is invalid or date filter format
            is invalid
          content:
            application/vnd.hmrc.1.0+json:
              schema:
                required:
                - dateTime
                - debugMessage
                - message
                type: object
                properties:
                  dateTime:
                    type: string
                    format: date-time
                  message:
                    type: string
                  debugMessage:
                    type: string
                  correlationId:
                    type: string
                    format: uuid
                    example: 3e8dae97-b586-4cef-8511-68ac12da9028
                  validatorResults:
                    type: array
                    items:
                      type: object
                      properties:
                        errorCategory:
                          type: string
                        errorType:
                          type: integer
                        errorReason:
                          type: string
                        errorLocation:
                          type: string
                        originalAttributeValue:
                          type: string
              examples:
                ernParameter:
                  summary: Filter ERN is not valid
                  value:
                    dateTime: 2024-01-17T16:26:18.062304Z
                    message: ERN parameter value error
                    debugMessage: The ERN GBWKQOZ8OVLDD supplied in the parameter
                      is not among the authorised ERNs GBWKQOZ8OVLYR
                dateFormat:
                  summary: Date filter format is not valid
                  value:
                    dateTime: 2024-01-17T16:27:41.095827Z
                    message: Invalid date format provided in the updatedSince query
                      parameter
                    debugMessage: Date format should be like '2020-11-15T17:02:34.00Z'
        "401":
          description: "Authorisation errors, e.g. excise number not authorised, authorisation\
            \ expired, invalid enrolment parameter."
          content:
            application/vnd.hmrc.1.0+json:
              schema:
                required:
                - dateTime
                - debugMessage
                - message
                type: object
                properties:
                  dateTime:
                    type: string
                    format: date-time
                  message:
                    type: string
                  debugMessage:
                    type: string
                  correlationId:
                    type: string
                    format: uuid
                    example: 3e8dae97-b586-4cef-8511-68ac12da9028
                  validatorResults:
                    type: array
                    items:
                      type: object
                      properties:
                        errorCategory:
                          type: string
                        errorType:
                          type: integer
                        errorReason:
                          type: string
                        errorLocation:
                          type: string
                        originalAttributeValue:
                          type: string
              example:
                dateTime: 2024-01-17T15:27:29.540089Z
                message: Authorisation error
                debugMessage: Unauthorised Exception with error Bearer token expired
      security:
      - userRestricted:
        - excise-movement-control-system
    post:
      tags:
      - Movements
      summary: Submit a new draft excise movement
      description: "Submit a new draft excise movement. </br></br>**Note:** The consignor\
        \ ID in the IE815 message must match an excise reference number (ERN) in the\
        \ bearer token that you use for API authentication. If it does not, a 403\
        \ Forbidden error will be thrown."
      operationId: submitMovement
      parameters:
      - name: Accept
        in: header
        description: "Specifies the response format and the [version](/api-documentation/docs/reference-guide#versioning)\
          \ of the API to be used."
        required: true
        style: simple
        explode: false
        schema:
          type: string
          enum:
          - application/vnd.hmrc.1.0+json
      - name: Content-Type
        in: header
        description: The media type of the request body.
        required: true
        style: simple
        explode: false
        schema:
          type: string
          enum:
          - application/vnd.hmrc.1.0+xml
          - application/xml
      requestBody:
        description: |
          The body for this request should be an XML body that conforms to the [IE815 XML Schema](https://github.com/hmrc/excise-movement-control-system-api/blob/main/app/xsd/ie815.xsd)

          An example can be found [here](https://github.com/hmrc/excise-movement-control-system-api/blob/main/resources/public/api/conf/1.0/examples/IE815.xml)
        content:
          application/xml:
            schema:
              type: object
              description: Submit draft movement
              xml:
                name: IE815
            examples:
              submitDraftMovement:
                summary: Submit draft movement (IE815)
                value: <IE815><!-- Example IE815 message --></IE815>
        required: true
      responses:
        "202":
          description: Accepted
          content:
            application/vnd.hmrc.1.0+json:
              schema:
                required:
                - consignorId
                - localReferenceNumber
                - movementId
                type: object
                properties:
                  movementId:
                    type: string
                    format: uuid
                    example: b6ba6a73-d723-4c9f-b9b7-99e533fb614f
                  boxId:
                    type: string
                    format: uuid
                    example: 42c75e22-7bba-44f2-a610-4b4c3b262e3e
                  localReferenceNumber:
                    pattern: ".{1,22}"
                    type: string
                  consignorId:
                    pattern: "[A-Z]{2}[a-zA-Z0-9]{11}"
                    type: string
                  consigneeId:
                    pattern: ".{1,16}"
                    type: string
                  administrativeReferenceCode:
                    pattern: "[0-9]{2}[A-Z]{2}[A-Z0-9]{16}[0-9]"
                    type: string
                  lastUpdated:
                    type: string
                    format: date-time
                xml:
                  name: exciseMovement
              example:
                movementId: b6ba6a73-d723-4c9f-b9b7-99e533fb614f
                boxId: 42c75e22-7bba-44f2-a610-4b4c3b262e3e
                localReferenceNumber: LRNQA20230909022221
                consignorId: GBWK002281023
                consigneeId: GBWKQOZ8OVLYR
        "400":
          description: The submission of the draft movement message has failed validation
          content:
            application/vnd.hmrc.1.0+json:
              schema:
                required:
                - dateTime
                - debugMessage
                - message
                type: object
                properties:
                  dateTime:
                    type: string
                    format: date-time
                  message:
                    type: string
                  debugMessage:
                    type: string
                  correlationId:
                    type: string
                    format: uuid
                    example: 3e8dae97-b586-4cef-8511-68ac12da9028
                  validatorResults:
                    type: array
                    items:
                      type: object
                      properties:
                        errorCategory:
                          type: string
                        errorType:
                          type: integer
                        errorReason:
                          type: string
                        errorLocation:
                          type: string
                        originalAttributeValue:
                          type: string
              examples:
                duplicateLrn:
                  summary: Duplicate LRN
                  value:
                    dateTime: 2024-01-17T15:21:17.170162Z
                    message: Duplicate LRN error
                    debugMessage: The local reference number lrnie8156540856 has already
                      been used for another movement
                jsonValidation:
                  summary: Json validation error downstream
                  value:
                    dateTime: 2021-12-17T09:30:47Z
                    status: BAD_REQUEST
                    message: Json validation failed
                    debugMessage: user is missing but it is required
                    emcsCorrelationId: 3e8dae97-b586-4cef-8511-68ac12da9028
                invalidIE815:
                  summary: Invalid IE815 message / XML parsing error
                  value:
                    dateTime: 2014-01-17T15:24:29.598475Z
                    message: Not valid IE815 message
                    debugMessage: "Error while parsing: DateOfDispatch field expected"
        "401":
          description: "Authorisation errors, e.g. consignor not authorised, authorisation\
            \ expired, invalid enrolment parameter."
          content:
            application/vnd.hmrc.1.0+json:
              schema:
                required:
                - dateTime
                - debugMessage
                - message
                type: object
                properties:
                  dateTime:
                    type: string
                    format: date-time
                  message:
                    type: string
                  debugMessage:
                    type: string
                  correlationId:
                    type: string
                    format: uuid
                    example: 3e8dae97-b586-4cef-8511-68ac12da9028
                  validatorResults:
                    type: array
                    items:
                      type: object
                      properties:
                        errorCategory:
                          type: string
                        errorType:
                          type: integer
                        errorReason:
                          type: string
                        errorLocation:
                          type: string
                        originalAttributeValue:
                          type: string
              example:
                dateTime: 2024-01-17T15:27:29.540089Z
                message: Authorisation error
                debugMessage: Unauthorised Exception with error Bearer token expired
        "403":
          description: Consignor ID is not in authorisation bearer token
          content:
            application/vnd.hmrc.1.0+json:
              schema:
                required:
                - dateTime
                - debugMessage
                - message
                type: object
                properties:
                  dateTime:
                    type: string
                    format: date-time
                  message:
                    type: string
                  debugMessage:
                    type: string
                  correlationId:
                    type: string
                    format: uuid
                    example: 3e8dae97-b586-4cef-8511-68ac12da9028
                  validatorResults:
                    type: array
                    items:
                      type: object
                      properties:
                        errorCategory:
                          type: string
                        errorType:
                          type: integer
                        errorReason:
                          type: string
                        errorLocation:
                          type: string
                        originalAttributeValue:
                          type: string
              examples:
                ConsignorNotAuthorised:
                  summary: Consignor not authorised
                  value:
                    dateTime: 2024-01-17T15:27:29.540089Z
                    message: Message cannot be sent
                    debugMessage: The Consignor is not authorised to submit this message
                      for the movement
                TokenError:
                  summary: Login has no associated ERN
                  value:
                    dateTime: 2024-01-17T15:27:29.540089Z
                    message: Authorisation error
                    debugMessage: Could not find ExciseNumber
        "404":
          description: Downstream connection refused
          content:
            application/vnd.hmrc.1.0+json:
              schema:
                required:
                - dateTime
                - debugMessage
                - message
                type: object
                properties:
                  dateTime:
                    type: string
                    format: date-time
                  message:
                    type: string
                  debugMessage:
                    type: string
                  correlationId:
                    type: string
                    format: uuid
                    example: 3e8dae97-b586-4cef-8511-68ac12da9028
                  validatorResults:
                    type: array
                    items:
                      type: object
                      properties:
                        errorCategory:
                          type: string
                        errorType:
                          type: integer
                        errorReason:
                          type: string
                        errorLocation:
                          type: string
                        originalAttributeValue:
                          type: string
              example:
                dateTime: 2021-12-17T09:31:12Z
                message: Received error response from server
                debugMessage: "Connection refused; nested exception is java.net.ConnectException:\
                  \ Connection refused"
                correlationId: b47a371c-01e6-4dc0-97c1-dd524f7035d0
        "422":
          description: The draft movement message has failed validation
          content:
            application/vnd.hmrc.1.0+json:
              schema:
                required:
                - dateTime
                - debugMessage
                - message
                type: object
                properties:
                  dateTime:
                    type: string
                    format: date-time
                  message:
                    type: string
                  debugMessage:
                    type: string
                  correlationId:
                    type: string
                    format: uuid
                    example: 3e8dae97-b586-4cef-8511-68ac12da9028
                  validatorResults:
                    type: array
                    items:
                      type: object
                      properties:
                        errorCategory:
                          type: string
                        errorType:
                          type: integer
                        errorReason:
                          type: string
                        errorLocation:
                          type: string
                        originalAttributeValue:
                          type: string
              example:
                dateTime: 2021-12-17T09:31:12Z
                message: Validation error
                debugMessage: Validation error(s) occurred
                validatorResults:
                - errorCategory: business
                  errorType: 8084
                  errorReason: The Date of Dispatch you entered is incorrect. It must
                    be today or later. Please amend your entry and resubmit.
                  errorLocation: "/urn:IE815[1]/urn:Body[1]/urn:SubmittedDraftOfEADESAD[1]/urn:EadEsadDraft[1]/urn:DateOfDispatch[1]"
                  originalAttributeValue: 2023-09-09
        "500":
          description: Internal server error
          content:
            application/vnd.hmrc.1.0+json:
              schema:
                required:
                - dateTime
                - debugMessage
                - message
                type: object
                properties:
                  dateTime:
                    type: string
                    format: date-time
                  message:
                    type: string
                  debugMessage:
                    type: string
                  correlationId:
                    type: string
                    format: uuid
                    example: 3e8dae97-b586-4cef-8511-68ac12da9028
                  validatorResults:
                    type: array
                    items:
                      type: object
                      properties:
                        errorCategory:
                          type: string
                        errorType:
                          type: integer
                        errorReason:
                          type: string
                        errorLocation:
                          type: string
                        originalAttributeValue:
                          type: string
              examples:
                downstreamError:
                  summary: Downstream internal server error
                  value:
                    dateTime: 2021-12-17T09:30:47Z
                    message: Invalid JSON structure
                    debugMessage: "JSON parse error: Unexpected character"
                    correlationId: 3e8dae97-b586-4cef-8511-68ac12da9028
                databaseError:
                  summary: Database error
                  value:
                    dateTime: 2024-01-17T15:27:29.540089Z
                    message: Database error
                    debugMessage: Error occurred while saving movement
        "503":
          description: Downstream service is Unavailable
          content:
            application/vnd.hmrc.1.0+json:
              schema:
                required:
                - dateTime
                - debugMessage
                - message
                type: object
                properties:
                  dateTime:
                    type: string
                    format: date-time
                  message:
                    type: string
                  debugMessage:
                    type: string
                  correlationId:
                    type: string
                    format: uuid
                    example: 3e8dae97-b586-4cef-8511-68ac12da9028
                  validatorResults:
                    type: array
                    items:
                      type: object
                      properties:
                        errorCategory:
                          type: string
                        errorType:
                          type: integer
                        errorReason:
                          type: string
                        errorLocation:
                          type: string
                        originalAttributeValue:
                          type: string
              example:
                dateTime: 2021-12-17T09:31:12Z
                message: CIRCUIT_BREAKER - 815_CB is OPEN
                debugMessage: CircuitBreaker '815_CB' is OPEN and does not permit
                  further calls
                correlationId: 4afb4a1e-33ca-42a5-8117-315db02b7f3c
      security:
      - userRestricted:
        - excise-movement-control-system
  /customs/excise/movements/{movementId}:
    get:
      tags:
      - Movements
      summary: Get excise movement
      description: Get excise movement for the supplied movement ID. </br></br>**Note:**
        You will only be able to retrieve movements where the consignor ID or consignee
        ID of the movement matches any of your excise reference numbers (ERNs) in
        the bearer token that you use for API authentication.
      operationId: getMovement
      parameters:
      - name: Accept
        in: header
        description: "Specifies the response format and the [version](/api-documentation/docs/reference-guide#versioning)\
          \ of the API to be used."
        required: true
        style: simple
        explode: false
        schema:
          type: string
          enum:
          - application/vnd.hmrc.1.0+json
      - name: movementId
        in: path
        description: Movement Id of the movement to be returned
        required: true
        style: simple
        explode: false
        schema:
          type: string
          format: uuid
          example: b6ba6a73-d723-4c9f-b9b7-99e533fb614f
      responses:
        "200":
          description: Successful operation. This will contain the details of the
            requested movement.
          content:
            application/vnd.hmrc.1.0+json:
              schema:
                required:
                - consignorId
                - localReferenceNumber
                - movementId
                type: object
                properties:
                  movementId:
                    type: string
                    format: uuid
                    example: b6ba6a73-d723-4c9f-b9b7-99e533fb614f
                  boxId:
                    type: string
                    format: uuid
                    example: 42c75e22-7bba-44f2-a610-4b4c3b262e3e
                  localReferenceNumber:
                    pattern: ".{1,22}"
                    type: string
                  consignorId:
                    pattern: "[A-Z]{2}[a-zA-Z0-9]{11}"
                    type: string
                  consigneeId:
                    pattern: ".{1,16}"
                    type: string
                  administrativeReferenceCode:
                    pattern: "[0-9]{2}[A-Z]{2}[A-Z0-9]{16}[0-9]"
                    type: string
                  lastUpdated:
                    type: string
                    format: date-time
                xml:
                  name: exciseMovement
              example:
                movementId: b6ba6a73-d723-4c9f-b9b7-99e533fb614f
                consignorId: GBWK002281023
                consigneeId: GBWKQOZ8OVLYR
                localReferenceNumber: LRNQA20230909022221
                administrativeReferenceCode: 35WE3B5EDSYSZ86STVKH8
                lastUpdated: 2024-01-17T15:27:29.540089Z
        "401":
          description: "Authorisation errors, e.g. excise number not authorised, authorisation\
            \ expired, invalid enrolment parameter."
          content:
            application/vnd.hmrc.1.0+json:
              schema:
                required:
                - dateTime
                - debugMessage
                - message
                type: object
                properties:
                  dateTime:
                    type: string
                    format: date-time
                  message:
                    type: string
                  debugMessage:
                    type: string
                  correlationId:
                    type: string
                    format: uuid
                    example: 3e8dae97-b586-4cef-8511-68ac12da9028
                  validatorResults:
                    type: array
                    items:
                      type: object
                      properties:
                        errorCategory:
                          type: string
                        errorType:
                          type: integer
                        errorReason:
                          type: string
                        errorLocation:
                          type: string
                        originalAttributeValue:
                          type: string
              example:
                dateTime: 2024-01-17T15:27:29.540089Z
                message: Authorisation error
                debugMessage: Unauthorised Exception with error Bearer token expired
        "404":
          description: Movement with supplied id not found for this ERN
          content:
            application/vnd.hmrc.1.0+json:
              schema:
                required:
                - dateTime
                - debugMessage
                - message
                type: object
                properties:
                  dateTime:
                    type: string
                    format: date-time
                  message:
                    type: string
                  debugMessage:
                    type: string
                  correlationId:
                    type: string
                    format: uuid
                    example: 3e8dae97-b586-4cef-8511-68ac12da9028
                  validatorResults:
                    type: array
                    items:
                      type: object
                      properties:
                        errorCategory:
                          type: string
                        errorType:
                          type: integer
                        errorReason:
                          type: string
                        errorLocation:
                          type: string
                        originalAttributeValue:
                          type: string
              examples:
                movementNotFound:
                  summary: Movement not in database
                  value:
                    dateTime: 2024-01-17T16:26:18.062304Z
                    message: Movement not found
                    debugMessage: Movement b6ba6a73-d723-4c9f-b9b7-99e533fb614f could
                      not not found
                movementNotForErn:
                  summary: Movement not valid for ERN
                  value:
                    dateTime: 2024-01-17T16:27:41.095827Z
                    message: Movement not found
                    debugMessage: Movement b6ba6a73-d723-4c9f-b9b7-99e533fb614f is
                      not found within the data for ERNs GBWK002281022
      security:
      - userRestricted:
        - excise-movement-control-system
  /customs/excise/movements/{movementId}/messages:
    get:
      tags:
      - Movements
      summary: Get all messages for an excise movement using the movementId
      description: "Get all messages for a specific excise movement. </br></br>**Note:**\
        \ The consignor ID or consignee ID must match an excise reference number (ERN)\
        \ in the bearer token that you use for API authentication. If it does not,\
        \ a 403 Forbidden error will be thrown."
      operationId: getAllMessages
      parameters:
