      properties:
        product:
          required:
          - exciseProductCode
          type: object
          properties:
            exciseProductCode:
              maxLength: 4
              pattern: "[A-Z][0-9]{3}"
              type: string
              description: The excise product category code
              example: W200
    ExciseTraderValidationResponse:
      required:
      - entityGroup
      - exciseRegistrationNumber
      - validTrader
      - validationTimestamp
      type: object
      properties:
        validationTimestamp:
          pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}(\\\\.[0-9]+)?([+-][0-9]{2}:[0-9]{2})?$"
          type: string
          example: 2001-12-17T09:30:47-05:00
        exciseRegistrationNumber:
          pattern: "[A-Z]{2}[a-zA-Z0-9]{11}"
          type: string
        entityGroup:
          type: string
          example: UK Record
          enum:
          - UK Record
          - EU Trader
          - EU Warehouse
          - UK Temporary Authorisation
          - EU Temporary Authorisation
        validTrader:
          type: boolean
        errorCode:
          type: string
          description: "The 'errorCode' for an invalid trader i.e., when validTrader\
            \ = \"false\".<br /> 1 = Pending<br /> 2 = Expired<br /> 3 = Withdrawn<br\
            \ /> 4 = Cancelled<br /> 5 = Used<br /> 6 = Not Found"
          enum:
          - "1"
          - "2"
          - "3"
          - "4"
          - "5"
          - "6"
        errorText:
          type: string
        traderType:
          type: string
          description: 1 = Warehouse Keeper<br /> 2 = Tax Warehouse<br /> 3 = Registered
            Consignor<br /> 4 = Registered Consignee<br /> 5 = Temporary Registered
            Consignee<br /> 6 = Temporary Registered Authorisation<br /> 7 = Other
          enum:
          - "1"
          - "2"
          - "3"
          - "4"
          - "5"
          - "6"
          - "7"
        validateProductAuthorisationResponse:
          required:
          - valid
          type: object
          properties:
            valid:
              type: boolean
            productError:
              type: array
              items:
                required:
                - errorCode
                - errorText
                - exciseProductCode
                type: object
                properties:
                  exciseProductCode:
                    maxLength: 4
                    pattern: "[A-Z][0-9]{3}"
                    type: string
                    description: The excise product category code
                    example: W200
                  errorCode:
                    type: string
                    description: 1 = Unrecognised EPC<br /> 2 = Unauthorised EPC<br
                      /> 3 = EPC exceeded
                    enum:
                    - "1"
                    - "2"
                    - "3"
                  errorText:
                    type: string
                    description: The 'errorText' will be populated with:<br /> 'Unrecognised
                      EPC' if errorCode = 1<br />'Unauthorised EPC' if errorCode =
                      2<br />'EPC exceeded' if errorCode = 3
    ValidateProductAuthorisationResponse:
      required:
      - valid
