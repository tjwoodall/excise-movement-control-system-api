    get:
      tags:
      - Movements
      summary: Get a message for an excise movement using the movementId and messageId
      description: "Get a message for a specific excise movement. </br></br>**Note:**\
        \ The consignor ID or consignee ID must match an excise reference number (ERN)\
        \ in the bearer token that you use for API authentication. If it does not,\
        \ a 403 Forbidden error will be thrown."
      operationId: getMessage
      parameters:
      - name: Accept
        in: header
        description: "Specifies the response format and the [version](/api-documentation/docs/reference-guide#versioning)\
          \ of the API to be used."
        required: true
        style: simple
        explode: false
        schema:
          type: string
          enum:
          - application/vnd.hmrc.1.0+xml
      - name: movementId
        in: path
        description: The movement to get messages for
        required: true
        style: simple
        explode: false
        schema:
          type: string
          format: uuid
          example: b6ba6a73-d723-4c9f-b9b7-99e533fb614f
      - name: messageId
